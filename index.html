<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setor Bancada | TurboSul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-turbo-indigo { background-color: #4F46E5; }
        .text-turbo-indigo { color: #4F46E5; }
        .os-selected { border-left: 4px solid #4F46E5 !important; background-color: #f8fafc !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #4F46E5; border-radius: 10px; }
        .input-measure { background-color: #f1f5f9; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .input-measure:focus { border-color: #4F46E5; outline: none; background-color: #fff; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen overflow-hidden">

    <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between sticky top-0 z-40 shadow-sm">
        <div class="flex items-center space-x-4">
            <img src="https://i.postimg.cc/Jh5Jvrc9/IMG-7901.png" alt="TurboSul Logo" class="h-10">
            <div>
                <h1 class="text-lg font-bold tracking-tight text-slate-900 uppercase">TurboSul - Controle de Produção</h1>
                <p class="text-xs text-slate-500 font-medium italic">Bancada / Usinagem / Reparos</p>
            </div>
        </div>
        <div class="flex items-center space-x-6">
            <div class="text-right border-r pr-6 border-slate-200">
                <p class="text-sm font-bold leading-none">Técnico de Bancada</p>
                <p class="text-[10px] text-turbo-indigo font-black uppercase tracking-wider">Setor Bancada</p>
            </div>
            <button class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-md text-sm font-bold transition">Sair</button>
        </div>
    </header>

    <div class="flex h-[calc(100vh-64px)]">
        <aside class="w-80 bg-white border-r border-slate-200 overflow-y-auto flex-shrink-0">
            <div class="p-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center sticky top-0 z-20">
                <h2 class="text-xs font-black uppercase tracking-widest text-slate-500 italic">Fila de Trabalho</h2>
                <button onclick="fetchQueue()" class="text-turbo-indigo hover:rotate-180 transition-all duration-500">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
            </div>
            <div id="os-list" class="divide-y divide-slate-100">
                <div class="p-8 text-center text-slate-400 text-xs italic animate-pulse">Carregando fila...</div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-6 space-y-6 bg-slate-50">
            <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-slate-400">
                <i class="fa-solid fa-screwdriver-wrench text-6xl mb-4 opacity-10"></i>
                <p class="uppercase tracking-widest font-bold text-sm">Selecione uma Ordem de Serviço</p>
            </div>

            <div id="main-workspace" class="hidden space-y-6">
                <div class="bg-turbo-indigo rounded-2xl shadow-lg text-white p-6 min-h-[120px] flex items-center justify-between relative overflow-hidden">
                    <div class="relative z-10 ml-4">
                        <h2 id="display-os" class="text-3xl font-black mb-1 italic tracking-tighter uppercase">OS-XXXX</h2>
                        <p id="display-desc" class="text-sm font-medium opacity-90 uppercase tracking-widest italic">CLIENTE | MODELO</p>
                    </div>
                    <button type="button" onclick="openSpecialModal()" class="relative z-10 bg-white/20 hover:bg-white/30 text-white border border-white/40 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">
                        + Adicionar Serviço Especial
                    </button>
                    <i class="fa-solid fa-wrench absolute right-[-20px] bottom-[-20px] text-white opacity-10 text-9xl"></i>
                </div>

                <div id="metrology-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-32"></div>
            </div>
        </main>
    </div>

    <!-- MODAL ESPECIAL -->
    <div id="modalSpecial" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden border-t-8 border-turbo-indigo">
            <div class="px-8 py-6 border-b flex justify-between items-center">
                <h3 class="font-black text-slate-800 uppercase text-lg">Nova Tarefa</h3>
                <button onclick="closeModal('modalSpecial')" class="text-slate-400 text-2xl">&times;</button>
            </div>
            <div class="p-8 space-y-6">
                <input type="text" id="special-name" placeholder="NOME DO COMPONENTE..." class="w-full bg-slate-100 rounded-2xl px-5 py-4 text-sm font-bold outline-none border-2 border-transparent focus:border-turbo-indigo">
                <button onclick="addSpecialCard()" class="w-full bg-turbo-indigo text-white font-black py-4 rounded-2xl uppercase text-xs shadow-lg">Adicionar</button>
            </div>
        </div>
    </div>

<script>
    const API_QUEUE = 'https://webhook.mareflow.com.br/webhook/production/workbench-queue';
    const API_ACTION = 'https://webhook.mareflow.com.br/webhook/production/component-routing';
    
    let selectedOS = null;
    let specialItems = [];

    const STRUCTURE = {
        'CT': ['ANÁLISE', 'ROSCAS', 'ROSCAS POSTIÇAS', 'FACEAMENTO PÉ/ MESA', 'FACEAMENTO SAÍDA', 'EMBUCHAMENTO', 'SOB MEDIDA', 'ABERTURA DE TRINCAS', 'RETIRAR PRISIONEIROS', 'REMOVER WASTEGATES', 'MONTAR WASTEGATE', 'FRESAMENTO DA MOEDA', 'ACENTAMENTO DA CCE', 'ADAPTAÇÃO DE BORDA', 'EMBUCHAMENTO SAÍDA'],
        'CCO': ['ANÁLISE', 'ROSCAS', 'ROSCAS POSTIÇAS', 'EMBUCHAMENTO', 'SOB MEDIDA', 'ABERTURA DE TRINCAS', 'RETIRAR PARAFUSOS', 'ADAPTAÇÃO ENCAIXE PRATO', 'ADAPTAÇÃO BOCAL ADMISSÃO', 'ADAPTAÇÃO BOCAL FILTRO', 'BOCAL ADMISSÃO', 'BOCAL FILTRO'],
        'COLETOR': ['ANÁLISE', 'RETIRAR PRISIONEIROS', 'ROSCAS', 'ROSCAS POSTIÇAS', 'FRESAMENTO', 'ABERTURA DE TRINCAS', 'FRESAMENTO DE COLETOR - FACE 1', 'FRESAMENTO DE COLETOR - FACE 2', 'FRESAMENTO FACE EGR'],
        'CCE': ['ANÁLISE', 'USINAR Borda Quente', 'USINAR Borda Fria', 'lixar', 'Concent.', 'Colo Mancal', 'Embuchar', 'Canal Viton', 'STEPBOARD', 'ADAPTAÇÃO', 'ROSCAS', 'TRANSFORMAÇÃO ROSCAS', 'ROSCAS POSTIÇAS', 'FRESAMENTO'],
        'EIXO': ['ANÁLISE', 'DESEMPENO', 'ABERTURA CAVA', 'USINAGEM', 'ABERTURA ANEL', 'RETIFICA', 'ROSCA EIXO', 'FACEAMENTO', 'FURO CENTRO', 'TRANSFORMAR', 'DESEMPENO DE PALHETA', 'TIRAR REBARBA EIXO', 'POLIMENTO EIXO'],
        'ROTOR': ['ANÁLISE', 'FACEAMENTO / PORCA', 'TRANSFORMAÇÃO', 'EMBUCHAMENTO ROTOR', 'FACEAMENTO DE PALHETA'],
        'REPAROS': ['FABRICAÇÃO MANCAL R.', 'FABRICAÇÃO MANCAL A.', 'PASSE EXTERNO M. RADIAL', 'PASSE INTERNO M. RADIAL', 'FACEAMENTO M. RADIAL', 'PASSE NA FLANGE', 'ADAPTAÇÃO DE FLANGE', 'SOLDA PROT. TÉRMICO', 'PRODUZIR PROT. TÉRMICO', 'FABRICAÇÃO ESPAÇADOR R', 'FABRICAÇÃO COLAR', 'CALÇO DE ALTURA']
    };

    async function fetchQueue() {
        const res = await fetch(API_QUEUE);
        const data = await res.json();
        const list = document.getElementById('os-list');
        list.innerHTML = data.map(os => `
            <div onclick="selectOS(${JSON.stringify(os).replace(/"/g, '&quot;')})" class="p-5 cursor-pointer bg-white border-l-4 border-transparent hover:bg-slate-50 mb-2 mx-4 mt-2 rounded-xl shadow-sm" id="card-${os.os_id}">
                <div class="flex justify-between font-black text-sm"><span>${os.business_id}</span><span class="text-[9px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded">${os.urgency}</span></div>
                <p class="text-xs font-bold text-slate-700 mt-1">${os.model}</p>
                <p class="text-[10px] text-slate-500 truncate">${os.client}</p>
            </div>
        `).join('');
    }

    function selectOS(os) {
        selectedOS = os;
        specialItems = [];
        document.querySelectorAll('#os-list > div').forEach(c => c.classList.remove('os-selected'));
        document.getElementById(`card-${os.os_id}`).classList.add('os-selected');
        document.getElementById('welcome-screen').classList.add('hidden');
        document.getElementById('main-workspace').classList.remove('hidden');
        document.getElementById('display-os').innerText = os.business_id;
        document.getElementById('display-desc').innerText = `${os.client} | ${os.model}`;
        renderComponents();
    }

    function renderComponents() {
        const grid = document.getElementById('metrology-grid');
        const listToRender = [...(selectedOS.components_to_render || []), ...specialItems];
        grid.innerHTML = listToRender.map(comp => {
            const tasks = STRUCTURE[comp] || ['AJUSTE GERAL BANCADA'];
            return `
                <div class="bg-white rounded-3xl shadow-sm border-2 border-slate-100 p-6 flex flex-col" id="comp-${comp}">
                    <div class="flex justify-between items-center mb-6">
                        <h4 class="text-2xl font-black text-slate-800 tracking-tighter italic uppercase">${comp}</h4>
                        <span class="text-[10px] font-black uppercase px-4 py-1.5 bg-turbo-indigo text-white rounded-full">Bancada</span>
                    </div>
                    <div class="space-y-3 flex-1">
                        ${tasks.map(t => `
                            <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                <input type="checkbox" class="w-5 h-5 rounded border-slate-300 text-turbo-indigo focus:ring-turbo-indigo">
                                <div class="flex-1">
                                    <p class="text-[10px] font-black text-slate-500 uppercase leading-tight">${t}</p>
                                    <input type="text" placeholder="Obs / Medida..." class="w-full mt-1 input-measure px-3 py-1.5 rounded-lg text-[11px] font-bold" data-service="${t}">
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="mt-6 pt-4 border-t grid grid-cols-2 gap-2">
                        <button onclick="sendTo(this, '${comp}', 'RETIFICA')" class="py-3 bg-slate-50 text-slate-700 text-[10px] font-black uppercase rounded-lg hover:bg-slate-100 transition">Retífica</button>
                        <button onclick="sendTo(this, '${comp}', 'SOLDA')" class="py-3 bg-slate-50 text-slate-700 text-[10px] font-black uppercase rounded-lg hover:bg-slate-100 transition">Solda</button>
                        <button onclick="sendTo(this, '${comp}', 'METROLOGIA')" class="py-3 bg-slate-50 text-slate-700 text-[10px] font-black uppercase rounded-lg hover:bg-slate-100 transition">Metrologia</button>
                        <button onclick="sendTo(this, '${comp}', 'MONTAGEM')" class="col-span-2 py-4 bg-emerald-600 text-white text-[11px] font-black uppercase rounded-xl shadow-lg mt-1">Pronto p/ Montagem</button>
                    </div>
                </div>`;
        }).join('');
    }

    async function sendTo(btn, comp, target) {
        const card = document.getElementById(`comp-${comp}`);
        const executed = Array.from(card.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.closest('.flex-1')?.querySelector('p').innerText || '');

        btn.disabled = true;
        btn.innerText = 'ENVIANDO...';
        
        try {
            const res = await fetch(API_ACTION, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    os_id: selectedOS.os_id, 
                    component_name: comp, 
                    target_sector: target, 
                    executed_services: executed 
                })
            });
            if(res.ok) { card.classList.add('opacity-40', 'grayscale', 'pointer-events-none'); btn.innerText = 'ENVIADO'; }
        } catch(e) { btn.disabled = false; btn.innerText = 'ERRO'; }
    }

    function openSpecialModal() { document.getElementById('modalSpecial').classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    function addSpecialCard() {
        const name = document.getElementById('special-name').value.toUpperCase();
        if(name) { specialItems.push(name); renderComponents(); closeModal('modalSpecial'); }
    }
    fetchQueue();
</script>
</body>
</html>
